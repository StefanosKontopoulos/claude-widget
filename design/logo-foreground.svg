<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Orange bar gradient: warm top → deeper bottom -->
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C42;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8580A;stop-opacity:1" />
    </linearGradient>

    <!-- Shadow: pure black fading out -->
    <linearGradient id="shadowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0.55" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- No background fill — fully transparent so Background Layer shows through -->

  <!-- Long shadows at 45°, bars scaled and centered within safe zone -->
  <polygon points="212,306 332,306 652,626 532,626" fill="url(#shadowGrad)"/>
  <polygon points="372,238 492,238 812,558 692,558" fill="url(#shadowGrad)"/>
  <polygon points="532,514 652,514 972,834 852,834" fill="url(#shadowGrad)"/>
  <polygon points="692,370 812,370 1132,690 1012,690" fill="url(#shadowGrad)"/>

  <!-- Bar 1 (left, tall) -->
  <rect x="212" y="306" width="120" height="480" rx="10" ry="10" fill="url(#barGrad)"/>
  <!-- Bar 2 (second, tallest) -->
  <rect x="372" y="238" width="120" height="548" rx="10" ry="10" fill="url(#barGrad)"/>
  <!-- Bar 3 (third, shortest) -->
  <rect x="532" y="514" width="120" height="272" rx="10" ry="10" fill="url(#barGrad)"/>
  <!-- Bar 4 (right, medium) -->
  <rect x="692" y="370" width="120" height="416" rx="10" ry="10" fill="url(#barGrad)"/>
</svg>

<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark gray Claude background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C1C1E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C2C2E;stop-opacity:1" />
    </linearGradient>

    <!-- Orange bar gradient: warm Claude orange top → deeper burnt orange bottom -->
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C42;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8580A;stop-opacity:1" />
    </linearGradient>

    <clipPath id="iconClip">
      <circle cx="512" cy="512" r="512"/>
    </clipPath>

    <!-- Shadow: pure black fading out -->
    <linearGradient id="shadowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0.70" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </linearGradient>
  </defs>

  <g clip-path="url(#iconClip)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="url(#bgGrad)"/>

    <!-- Long shadows (45° flat shadow behind each orange bar) -->
    <polygon points="118,230 268,230 668,630 518,630" fill="url(#shadowGrad)"/>
    <polygon points="318,145 468,145 868,545 718,545" fill="url(#shadowGrad)"/>
    <polygon points="518,490 668,490 1024,846 878,846"  fill="url(#shadowGrad)"/>
    <polygon points="718,310 868,310 1024,466 1024,616 868,616" fill="url(#shadowGrad)"/>

    <!-- Bar 1 (left, tall) -->
    <rect x="118" y="230" width="150" height="600" rx="12" ry="12" fill="url(#barGrad)"/>
    <!-- Bar 2 (second, tallest) -->
    <rect x="318" y="145" width="150" height="685" rx="12" ry="12" fill="url(#barGrad)"/>
    <!-- Bar 3 (third, shortest) -->
    <rect x="518" y="490" width="150" height="340" rx="12" ry="12" fill="url(#barGrad)"/>
    <!-- Bar 4 (right, medium) -->
    <rect x="718" y="310" width="150" height="520" rx="12" ry="12" fill="url(#barGrad)"/>
  </g>
</svg>
